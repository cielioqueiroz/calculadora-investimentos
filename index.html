<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Simule e compare rendimentos de investimentos brasileiros."
    />
    <meta name="theme-color" content="#0B0C0E" />
    <title>Calculadora de Investimentos</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        const stored = JSON.parse(
          localStorage.getItem('investment-calculator:preferences'),
        )
        const prefs = stored && stored.state ? stored.state : {}
        const theme = prefs.theme || 'dark'
        if (theme === 'dark') document.documentElement.classList.add('dark')
        if (prefs.locale) document.documentElement.lang = prefs.locale
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
